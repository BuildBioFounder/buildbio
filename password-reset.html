<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BuildBio — Reset Password</title>
  <link rel="icon" type="image/png" href="https://bicmwjtkncjkguumbidq.supabase.co/storage/v1/object/public/images/favicon-32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #E85D2C; --orange-dim: #B84820; --olive: #5C6B3A;
      --dark: #0F0F0F; --dark-2: #161616; --dark-3: #1E1E1E; --dark-4: #2A2A2A;
      --border: rgba(255,255,255,0.08); --text: #F0EDE8; --text-dim: #888;
      --font-display: 'Barlow Condensed', sans-serif; --font-body: 'Barlow', sans-serif;
    }
    html, body { height: 100%; background: var(--dark); color: var(--text); font-family: var(--font-body); }
    .page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { width: 100%; max-width: 420px; animation: fadeUp 0.5s ease both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 40px; text-decoration: none; justify-content: center; }
    .logo-mark { width: 36px; height: 36px; position: relative; }
    .logo-b-back { position: absolute; top: 4px; left: 4px; font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--olive); line-height: 1; }
    .logo-b-front { position: absolute; top: 0; left: 0; font-family: var(--font-display); font-size: 28px; font-weight: 800; color: var(--orange); line-height: 1; }
    .logo-wordmark { font-family: var(--font-display); font-size: 20px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }

    .form-heading { font-family: var(--font-display); font-size: 32px; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 6px; text-align: center; }
    .form-subheading { font-size: 14px; color: var(--text-dim); margin-bottom: 32px; text-align: center; line-height: 1.6; }
    .form-subheading a { color: var(--orange); text-decoration: none; }
    .form-subheading a:hover { text-decoration: underline; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 6px; }
    .field input { width: 100%; padding: 12px 14px; background: var(--dark-3); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-body); font-size: 15px; transition: all 0.2s; outline: none; -webkit-appearance: none; }
    .field input::placeholder { color: #555; }
    .field input:focus { border-color: var(--orange); background: var(--dark-4); box-shadow: 0 0 0 3px rgba(216,90,48,0.1); }

    .submit-btn { width: 100%; padding: 14px; background: var(--orange); border: none; border-radius: 10px; color: #fff; font-family: var(--font-display); font-size: 17px; font-weight: 700; letter-spacing: 0.04em; cursor: pointer; transition: all 0.2s; margin-top: 8px; position: relative; }
    .submit-btn:hover:not(:disabled) { background: var(--orange-dim); transform: translateY(-1px); box-shadow: 0 4px 20px rgba(216,90,48,0.3); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-spinner { display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; position: absolute; right: 16px; top: 50%; transform: translateY(-50%); }
    .submit-btn.loading .btn-spinner { display: block; }
    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    .msg { padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; margin-bottom: 16px; display: none; }
    .msg.error { background: rgba(224,85,85,0.12); border: 1px solid rgba(224,85,85,0.3); color: #f07070; }
    .msg.success { background: rgba(92,107,58,0.2); border: 1px solid rgba(92,107,58,0.4); color: #a8c070; }
    .msg.show { display: block; }

    .back-link { display: block; text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-dim); }
    .back-link a { color: var(--orange); text-decoration: none; }
    .back-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="page">
  <div class="card">
    <a href="index.html" class="logo">
      <div class="logo-mark"><span class="logo-b-back">B</span><span class="logo-b-front">B</span></div>
      <span class="logo-wordmark">BUILDBIO</span>
    </a>

    <h1 class="form-heading">Reset your password</h1>
    <p class="form-subheading">Enter the email address on your account. We'll send a link to reset your password.</p>

    <div class="msg" id="msg"></div>

    <form id="form-reset" novalidate>
      <div class="field">
        <label for="reset-email">Email</label>
        <input type="email" id="reset-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <button type="submit" class="submit-btn" id="btn-reset">
        Send Reset Link
        <span class="btn-spinner"></span>
      </button>
    </form>

    <p class="back-link">Remember your password? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://bicmwjtkncjkguumbidq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY213anRrbmNqa2d1dW1iaWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzY3MTYsImV4cCI6MjA5MjkxMjcxNn0.RdLFicGLAoddIfD5IDMNCQ1ocIyoSGEcL9Y9zOzjs_0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function showMsg(text, type = 'error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}

function setLoading(btn, loading) {
  btn.disabled = loading;
  loading ? btn.classList.add('loading') : btn.classList.remove('loading');
}

document.getElementById('form-reset').addEventListener('submit', async e => {
  e.preventDefault();
  const email = document.getElementById('reset-email').value.trim();
  const btn = document.getElementById('btn-reset');

  if (!email) return showMsg('Please enter your email address.');

  setLoading(btn, true);
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/password-reset-confirm.html'
  });
  setLoading(btn, false);

  if (error) return showMsg(error.message);
  showMsg('Password reset link sent. Check your email.', 'success');
});
</script>
</body>
</html>
