  <title>BuildBio — Sign In</title>

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #E85D2C;
      --orange-dim: #B84820;
      --olive: #5C6B3A;
      --dark: #0F0F0F;
      --dark-2: #161616;
      --dark-3: #1E1E1E;
      --dark-4: #2A2A2A;
      --border: rgba(255,255,255,0.08);
      --text: #F0EDE8;
      --text-dim: #888;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: var(--font-body);
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
      .hero { display: none; }
    }

    .hero {
      position: relative;
      overflow: hidden;
      background: var(--dark-2);
    }

    .hero-bg {
      position: absolute; inset: 0;
      background:
        linear-gradient(160deg, rgba(216,90,48,0.15) 0%, transparent 50%),
        linear-gradient(to bottom, rgba(15,15,15,0) 60%, rgba(15,15,15,0.95) 100%);
      z-index: 1;
    }

    .hero-img {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.45;
      display: block;
    }

    .hero-content {
      position: absolute; inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 48px;
    }

    .hero-tagline {
      font-family: var(--font-display);
      font-size: clamp(36px, 4vw, 52px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -0.01em;
      color: var(--text);
      margin-bottom: 16px;
    }

    .hero-tagline span { color: var(--orange); }

    .hero-sub {
      font-size: 15px;
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 360px;
    }

    .form-panel {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 48px 40px;
      background: var(--dark);
      position: relative;
    }

    .form-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 1px; height: 100%;
      background: linear-gradient(to bottom, transparent, var(--border) 20%, var(--border) 80%, transparent);
    }

    .form-inner {
      width: 100%;
      max-width: 400px;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 40px;
      text-decoration: none;
    }

    .logo-mark {
      width: 36px; height: 36px;
      position: relative;
    }

    .logo-b-back {
      position: absolute;
      top: 4px; left: 4px;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: var(--olive);
      line-height: 1;
    }

    .logo-b-front {
      position: absolute;
      top: 0; left: 0;
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 800;
      color: var(--orange);
      line-height: 1;
    }

    .logo-wordmark {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .form-heading {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.01em;
      margin-bottom: 6px;
    }

    .form-subheading {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }

    .form-subheading a {
      color: var(--orange);
      text-decoration: none;
    }

    .form-subheading a:hover { text-decoration: underline; }

    .sso-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 24px;
    }

    .sso-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--dark-3);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .sso-btn:hover {
      background: var(--dark-4);
      border-color: rgba(255,255,255,0.15);
    }

    .sso-icon { width: 18px; height: 18px; flex-shrink: 0; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      background: var(--dark-3);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      transition: all 0.2s;
      outline: none;
      -webkit-appearance: none;
    }

    .field input::placeholder { color: #555; }

    .field input:focus {
      border-color: var(--orange);
      background: var(--dark-4);
      box-shadow: 0 0 0 3px rgba(216,90,48,0.1);
    }

    .field input.error { border-color: #e05555; }

    .field-pw { position: relative; }
    .field-pw input { padding-right: 44px; }
    .pw-toggle {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 4px;
      display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--text); }

    .forgot-row {
      text-align: right;
      margin-bottom: 16px;
    }

    .forgot-row a {
      font-size: 13px;
      color: var(--text-dim);
      text-decoration: none;
    }

    .forgot-row a:hover {
      color: var(--orange);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--orange);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--orange-dim);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(216,90,48,0.3);
    }

    .submit-btn:active:not(:disabled) { transform: translateY(0); }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      right: 16px; top: 50%;
      transform: translateY(-50%);
    }

    .submit-btn.loading .btn-spinner { display: block; }

    @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

    .msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
      display: none;
    }

    .msg.error {
      background: rgba(224,85,85,0.12);
      border: 1px solid rgba(224,85,85,0.3);
      color: #f07070;
    }

    .msg.success {
      background: rgba(92,107,58,0.2);
      border: 1px solid rgba(92,107,58,0.4);
      color: #a8c070;
    }

    .msg.show { display: block; }

    .legal {
      font-size: 11px;
      color: #555;
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }

    .legal a { color: #666; text-decoration: none; }
    .legal a:hover { color: var(--text-dim); text-decoration: underline; }

    @media(max-width:480px){
      .form-panel{padding:32px 20px}
      .pw-toggle{padding:12px;right:4px}
      .forgot-row a{padding:10px 0;display:inline-block}
    }
  </style>
</head>
<body>

<div class="page">

  <div class="hero">
    <img class="hero-img"
      src="https://bicmwjtkncjkguumbidq.supabase.co/storage/v1/object/public/images/Gemini_Generated_Image_admnghadmnghadmn.png"
      alt="Modified vehicle at sunset"
      onerror="this.src='https://bicmwjtkncjkguumbidq.supabase.co/storage/v1/object/public/images/BB_hero_jeep-wrangler_alpine-ridge_golden_20260425_1089062651.webp'">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <div class="hero-tagline">
        Welcome<br>
        <span>back.</span>
      </div>
      <p class="hero-sub">
        Sign in to manage your builds, check your scan stats, and keep your profile up to date.
      </p>
    </div>
  </div>

  <div class="form-panel">
    <div class="form-inner">

      <a href="index.html" class="logo">
        <div class="logo-mark">
          <span class="logo-b-back">B</span>
          <span class="logo-b-front">B</span>
        </div>
        <span class="logo-wordmark">BUILDBIO</span>
      </a>

      <h1 class="form-heading">Sign in</h1>
      <p class="form-subheading">
        Don't have an account? <a href="signup.html">Sign up free</a>
      </p>

      <div class="msg" id="msg"></div>

      <form id="form-login" novalidate>
        <div class="field">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
        </div>
        <div class="field field-pw">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Your password" autocomplete="current-password">
          <button type="button" class="pw-toggle" aria-label="Toggle password">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="forgot-row">
          <a href="password-reset.html">Forgot password?</a>
        </div>
        <button type="submit" class="submit-btn" id="btn-login">
          Sign In
          <span class="btn-spinner"></span>
        </button>
      </form>

      <p class="legal">
        By continuing, you agree to the
        <a href="terms.html">Terms of Service</a> and
        <a href="privacy.html">Privacy Policy</a>.
      </p>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://bicmwjtkncjkguumbidq.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJpY213anRrbmNqa2d1dW1iaWRxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzY3MTYsImV4cCI6MjA5MjkxMjcxNn0.RdLFicGLAoddIfD5IDMNCQ1ocIyoSGEcL9Y9zOzjs_0';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

function showMsg(text, type = 'error') {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + type + ' show';
}
function clearMsg() {
  document.getElementById('msg').className = 'msg';
}
function setLoading(btn, loading) {
  btn.disabled = loading;
  loading ? btn.classList.add('loading') : btn.classList.remove('loading');
}

document.querySelector('.pw-toggle').addEventListener('click', () => {
  const input = document.getElementById('login-password');
  input.type = input.type === 'password' ? 'text' : 'password';
});

document.getElementById('form-login').addEventListener('submit', async e => {
  e.preventDefault();
  clearMsg();
  const email    = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const btn      = document.getElementById('btn-login');

  if (!email || !password) return showMsg('Please enter your email and password.');

  setLoading(btn, true);
  const { data, error } = await sb.auth.signInWithPassword({ email, password });
  setLoading(btn, false);

  if (error) return showMsg(error.message);

  const { data: vehicles } = await sb.from('vehicles').select('id').eq('owner_id', data.user.id).limit(1);
  if (vehicles && vehicles.length > 0) {
    window.location.href = 'account.html';
  } else {
    window.location.href = 'vehicle/new.html';
  }
});

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    const { data: vehicles } = await sb.from('vehicles').select('id').eq('owner_id', session.user.id).limit(1);
    if (vehicles && vehicles.length > 0) {
      window.location.href = 'account.html';
    } else {
      window.location.href = 'vehicle/new.html';
    }
  }
})();
</script>

</body>
